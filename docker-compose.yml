# Author: Dwain

services:
  db:
    # Thamindu & Ashen (Mac users): comment the line below and uncomment the azure-sql-edge line.
    image: mcr.microsoft.com/mssql/server:2022-latest
    # image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: dyadic-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-adminPass123@}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - dyadic-sql-data:/var/opt/mssql

volumes:
  dyadic-sql-data:

